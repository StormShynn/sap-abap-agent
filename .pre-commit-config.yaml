# Pre-commit config cho sap-abap-agent
#
# 2 cach su dung:
#   A) Framework pre-commit (khuyen nghi cho contributor moi):
#      pip install pre-commit
#      pre-commit install
#      pre-commit run --all-files
#
#   B) Git hook built-in (khong can framework):
#      cp reference/scripts/pre-commit .git/hooks/pre-commit
#      chmod +x .git/hooks/pre-commit
#
# Ca 2 cach chay CUNG 3 check (validate_plugin + validate_inspired_by_links + pytest)
# CONG voi ruff (chỉ thêm, không thay đổi logic hiện có).

default_install_hook_types: [pre-commit]
default_stages: [pre-commit]
fail_fast: false

repos:
  - repo: local
    hooks:
      - id: validate-plugin
        name: Validate plugin structure (frontmatter, drift, syntax)
        entry: python reference/scripts/validate_plugin.py
        language: system
        types: [python, markdown]
        pass_filenames: false
        stages: [pre-commit]

      - id: validate-inspired-by-links
        name: Validate Inspired-by GitHub URLs (no 404)
        entry: python reference/scripts/validate_inspired_by_links.py --strict --concurrency 8
        language: system
        types_or: [markdown]
        pass_filenames: false
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: pytest
        name: Run pytest (tests/ + reference/mcp-server/tests/)
        entry: python -m pytest tests/ reference/mcp-server/tests/ -q --no-header -p no:cacheprovider
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]

  # Public hooks (download 1 lan qua `pre-commit install`).
  # Version pinned theo khoang thoi gian hien tai (2026-Q3).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        name: ruff (lint)
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python]
        pass_filenames: false
        stages: [pre-commit]

      - id: ruff-format
        name: ruff (format)
        types_or: [python]
        pass_filenames: false
        stages: [pre-commit]

  # Standard hygiene checks (trailing whitespace, EOL, file size, JSON/YAML).
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-added-large-files
        args: [--maxkb=1024]  # 1MB/file - chan nho file 5MB nhu released-objects-index.json
        exclude: |
          (?x)^(
            docs/sap-knowledge/released-objects-index\.json
          )$
