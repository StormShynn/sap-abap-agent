name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Pages
        uses: actions/configure-pages@v6

      # Remove build scratch files before uploading Pages artifact (do not delete from repo).
      - name: Drop .tmp artifacts
        run: |
          rm -f index.head.tmp index.tail.tmp translations.tmp
          find . -maxdepth 4 -type d \( -name translations -o -name translations.tmp \) -prune -exec rm -rf {} +
          echo "tmp artifacts removed"

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5