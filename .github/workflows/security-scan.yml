name: Security Scan

# Chay security_scan.py (custom static analysis) o moi push/PR.
# Day la BO SUNG cho codeql.yml (phan tich TypeScript cho vendored extension).
# security_scan.py quet Python (MCP server + hooks + scripts) + TS (vendored).

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write  # de upload SARIF neu muon

concurrency:
  group: "security"
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run security scan (HIGH/MEDIUM findings)
        run: |
          python reference/scripts/security_scan.py
          # HIGH findings -> exit 1 (block merge)
          # MEDIUM findings -> print only, non-blocking

      - name: Run bandit (Python security linter)
        # Bandit phat hien cac pattern security chuan trong Python (SQL injection,
        # hard-coded password, weak crypto, ...). Bo sung cho security_scan.py
        # (custom rule tu code review). MEDIUM severity khong block.
        run: |
          pip install bandit
          # Scan Python source cua MCP server + hooks + scripts.
          # Skip test files + node_modules.
          bandit -r reference/mcp-server/sap_btp_agent hooks reference/scripts             --skip B101  # B101 = assert (test code only - khong phai security issue thuc te)
            --exclude '*/tests/*,*/__pycache__/*,*/build/*'
          # MEDIUM va LOW findings: khong block. HIGH findings: bandit exit 1.

      - name: Scan clear-text logging
        # Custom check (scan_clear_text_logging.py) - phat hien print() secret/token/password.
        # Warning only, vi co nhieu false positive trong comment/docstring.
        run: |
          python reference/scripts/scan_clear_text_logging.py || true

      - name: Upload SARIF (optional)
        if: always()
        continue-on-error: true
        run: |
          echo "TODO: convert scan output to SARIF and upload to code-scanning UI."
          echo "Hien tai security_scan.py chi in text, chua emit SARIF."
